name: Update deals daily

on:
  schedule:
    - cron: "17 11 * * *"   # every day at 11:17 UTC (~7:17am ET)
  workflow_dispatch:         # lets you run it manually from the Actions tab
  push:
    branches: [main]
    paths-ignore:
      - "docs/data.json"     # don't re-trigger when the bot commits new data

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest Form C filings from SEC EDGAR
        run: node pipeline/fetch.mjs
        env:
          # SEC requires a contact in the User-Agent. EDIT THIS to your real email.
          SEC_USER_AGENT: "DealFeed (contact: marc.firpo@yale.edu)"

      - name: Commit updated data
        run: |
          git config user.name "dealfeed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "Update deals $(date -u +%F)"
          git push
